name: Refresh Space-Track scoreboard

on:
  schedule:
    - cron: "17 6 * * *"   # daily, 06:17 UTC
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch scoreboard and advisory
        run: python scripts/fetch_spacetrack.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/spacetrack.json; then
            git add data/spacetrack.json
            git commit -m "data: refresh Space-Track scoreboard ($(date -u +%F))"
            git push
          else
            echo "No change in scoreboard data."
          fi
