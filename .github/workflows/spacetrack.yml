name: Refresh orbital data (scoreboard + TLEs)

on:
  schedule:
    - cron: "17 6 * * *"   # daily, 06:17 UTC
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 ahead of deadline

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch scoreboard from Space-Track API
        env:
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
        run: python scripts/fetch_spacetrack.py

      - name: Fetch TLEs from CelesTrak
        run: python scripts/fetch_tles.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/; then
            git add data/
            git commit -m "data: refresh scoreboard + TLEs ($(date -u +%F))"
            git push
          else
            echo "No change in scoreboard data."
          fi
